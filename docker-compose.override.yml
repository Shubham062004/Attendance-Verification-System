version: "3.8"

services:
  backend:
    environment:
      - ENVIRONMENT=development
      - PORT=8000
      - SECRET_KEY=some-super-secret-key-change-in-production
      - JWT_SECRET=some-jwt-secret-key-change-in-production
      - CORS_ALLOWED_ORIGINS=http://localhost:3000,http://127.0.0.1:3000
    volumes:
      - ./backend:/app

  frontend:
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
